        * {

            padding: 0;

        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #capture-node {
            background-color: white;
            width: 95%;
            max-width: 420px;
            padding: 40px 25px;
            text-align: center;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative;
        }

        .logo-text {
            font-family: 'Brush Script MT', cursive;
            font-size: 4.5rem;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        #loader {
            display: none;
            margin: 20px auto;
        }
        .heart-loader {
            font-size: 50px;
            animation: heartbeat 1s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .funky-msg {
            font-size: 16px;
            line-height: 1.5;
            padding: 15px;
            background: #fff5f6;
            border-radius: 20px;
            border: 2px dashed #ff9a9e;
            margin-top: 15px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            background-color: #f9f9f9;
            outline: none;
            font-size: 16px;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: #dc2743; }

        .btn-calculate, .btn-download {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.2s;

        .btn-calculate:active { transform: scale(0.95); }

        .percentage-text {
            font-size: 65px;
            font-weight: 900;
            color: #ed4956;
            margin: 5px 0;
            text-shadow: 2px 2px 10px rgba(237, 73, 86, 0.2);

    <script>
        const audio = document.getElementById('loveSong');
        let musicPlaying = false;

        function toggleMusic() {
            if (musicPlaying) {
                audio.pause();
                document.getElementById('music-toggle').innerText = "🔇";
            } else {
                audio.play().catch(e => {});
                document.getElementById('music-toggle').innerText = "🔊";
            }
            musicPlaying = !musicPlaying;
        }

        function startAnalysis() {
            const n1 = document.getElementById('name1').value.trim();
            const n2 = document.getElementById('name2').value.trim();
            
            if (!n1 || !n2) { 
                alert("দয়া করে দুটি নামই লিখুন! 😂"); 
                return; 
            }

            if (!musicPlaying) toggleMusic();

            document.getElementById('input-area').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                showResult(n1, n2);
            }, 2000);
        }

        function showResult(n1, n2) {
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            
            document.getElementById('names-display').innerText = n1 + " 💖 " + n2;

            // Logic for calculation
            let score = ((n1.length + n2.length) * 7 + (n1.charCodeAt(0) || 0)) % 101;
            
            // Easter egg for certain names (optional)
            if ((n1+n2).toLowerCase().includes("ahana")) score = 100;

            let current = 0;
            const timer = setInterval(() => {
                if (current >= score) {
                    clearInterval(timer);
                    finalizeUI(score);
                } else {
                    current++;
                    document.getElementById('score-val').innerText = current + "%";
                }
            }, 20);
        }

            else if (val >= 70) list = memeDatabase.range70;
            else if (val >= 60) list = memeDatabase.range60;
            else if (val >= 50) list = memeDatabase.range50;
            else if (val >= 40) list = memeDatabase.range40;
            else if (val >= 30) list = memeDatabase.range30;
            else if (val >= 20) list = memeDatabase.range20;
            else list = memeDatabase.range0;

            // Random selection from the list
            const result = list[Math.floor(Math.random() * list.length)];
            
            label.innerText = result.l;
            msgEl.innerText = result.m;

        function downloadCard() {
            const node = document.getElementById('capture-node');
            const actionBtns = document.getElementById('action-buttons');
            const musicBtn = document.getElementById('music-toggle');
            
            actionBtns.style.display = 'none';
            musicBtn.style.display = 'none';

            html2canvas(node, {
                scale: 3, 
                backgroundColor: "#ffffff",
                borderRadius: 30
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Love_Result_Pritam.png';
                link.href = canvas.toDataURL("image/png");
                link.click();

                actionBtns.style.display = 'block';
                musicBtn.style.display = 'block';
            });
        }
