<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calc Ultra Pro - Pritam Mistry</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #ff4d6d; --glass: rgba(255, 255, 255, 0.25); --border: rgba(255, 255, 255, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; color: #333;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #capture-node {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); width: 100%; max-width: 450px;
            padding: 25px 15px; border-radius: 40px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .logo-text { font-family: 'Brush Script MT', cursive; font-size: 3.5rem; background: linear-gradient(45deg, #ff4d6d, #ff8fa3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input, select { 
            width: 100%; padding: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.6); 
            border-radius: 12px; margin-bottom: 8px; outline: none; font-size: 13px;
        }

        .btn-main { 
            width: 100%; padding: 15px; border: none; border-radius: 15px; background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .option-btn { 
            display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border);
            background: rgba(255,255,255,0.8); border-radius: 10px; cursor: pointer; text-align: left; font-size: 14px;
        }
        .option-btn:hover { background: #ff4d6d; color: white; }
        
        .meter-container { width: 120px; height: 60px; position: relative; margin: 15px auto; overflow: hidden; border-radius: 100px 100px 0 0; background: #eee; }
        #meter-fill { position: absolute; top: 100%; left: 50%; width: 100%; height: 100%; background: #ff4d6d; transform-origin: top center; transform: translateX(-50%) rotate(0deg); transition: 2s; }
        
        .tips-box { background: rgba(255,255,255,0.5); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px dashed #ff4d6d; font-size: 13px; font-style: italic; color: #444; line-height: 1.5; text-align: left; }

        #rating-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 350px; text-align: center; }
        .stars { font-size: 35px; cursor: pointer; color: #ccc; margin: 10px 0; }
        .stars span.active { color: #f1c40f; }

        .contact-us { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 15px; }
        .social-links a {
            display: inline-block; margin: 0 5px; color: #333; text-decoration: none;
            font-size: 10px; background: rgba(255,255,255,0.4); padding: 6px 12px; border-radius: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <audio id="loveSong" loop><source src="Real_love.mp3" type="audio/mpeg"></audio>

    <div id="capture-node">
        <div class="logo-text">Love Calc</div>
        <p style="font-size: 10px; font-weight: bold; margin-bottom: 15px;">ADVANCED EDITION | BY PRITAM MISTRY</p>

        <div id="calc-section">
            <input type="text" id="name1" placeholder="Your Name">
            <div style="display: flex; gap: 5px;">
                <input type="number" id="year1" placeholder="Birth Year">
                <select id="month1"><option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option><option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option><option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option></select>
            </div>
            <input type="text" id="name2" placeholder="Crush Name">
            <div style="display: flex; gap: 5px;">
                <input type="number" id="year2" placeholder="Birth Year">
                <select id="month2"><option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option><option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option><option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option></select>
            </div>
            <button class="btn-main" onclick="startAnalysis()">Analyse Love ❤️</button>
            <p onclick="toggleMode('quiz')" style="color: #d63384; cursor: pointer; font-weight: bold; text-decoration: underline; font-size: 13px; margin-top: 15px;">Switch to Love Questions 📝</p>
        </div>

        <div id="quiz-section" style="display:none;">
            <h4 id="q-text" style="margin-bottom: 15px; font-size: 15px; min-height: 45px;"></h4>
            <div id="options-area"></div>
            <p id="q-progress" style="font-size: 11px; margin-top: 10px; color: #555;"></p>
        </div>

        <div id="result-box" style="display:none;">
            <h3 id="display-names" style="font-size: 18px; margin-bottom: 5px; color: #ff4d6d;"></h3>
            <div class="meter-container"><div id="meter-fill"></div></div>
            <h2 id="score-val" style="color:#ff4d6d; font-size: 45px;">0%</h2>
            <p id="final-msg" style="font-weight: 600; padding: 5px; font-size: 14px;"></p>
            <div id="tips-area" class="tips-box"></div>
            
            <div id="action-btns" style="margin-top: 15px;">
                <button class="btn-main" onclick="saveToGallery()" style="background: #333; margin-bottom: 10px;">Save To Gallery 📸</button>
                <button class="btn-main" onclick="location.reload()" style="background: transparent; border: 1px solid #ff4d6d; color: #ff4d6d;">Retry 🔄</button>
            </div>
        </div>

        <div class="contact-us" id="contact-sec">
            <p style="font-size: 11px; margin-bottom: 10px; font-weight: bold;">Created By Pritam</p>
            <div class="social-links">
                <a href="https://www.facebook.com/share/1KbDpquDoS/" target="_blank">Facebook</a>
                <a href="https://www.instagram.com/pritamxii?igsh=MW1ja2N4MXhxMTdiYg==" target="_blank">Instagram</a>
            </div>
        </div>
        <footer id="footer-sec" style="margin-top: 15px; font-size: 9px; opacity: 0.7;">© 2026 PRITAM MISTRY</footer>
    </div>

    <div id="rating-modal">
        <div class="modal-content">
            <h3>Rate Your Experience</h3>
            <div class="stars" id="star-container">
                <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
            </div>
            <p id="rating-msg" style="font-size: 13px; font-weight: bold; color: #ff4d6d; min-height: 40px;"></p>
            <button class="btn-main" onclick="closeRating()" style="padding: 10px; font-size: 12px;">Close</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('loveSong');
        let quizScore = 0; let qIndex = 0; let selectedQuestions = [];

        ];

        const ratingsData = {

            5: ["একদম perfect!", "অসাধারণ অনুভূতি ❤️"]
        };

        function toggleMode(mode) {
            document.getElementById('calc-section').style.display = mode === 'calc' ? 'block' : 'none';
            document.getElementById('quiz-section').style.display = mode === 'quiz' ? 'block' : 'none';
            if(mode === 'quiz') startQuiz();
        }

        function startQuiz() {
            // SHUFFLE: Randomly picks exactly 15 questions
            selectedQuestions = [...questionBank].sort(() => Math.random() - 0.5).slice(0, 15);
            qIndex = 0; quizScore = 0;
            showQuestion();
        }

        function showQuestion() {
            // এটি চেক করবে যদি ১৫টি প্রশ্ন শেষ হয়
            if(qIndex >= 15) { 
                let calculatedScore = Math.floor(Math.random() * 41 + 59);
                showResult(calculatedScore, "Quiz Result"); 
                return; 
            }
            const q = selectedQuestions[qIndex];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-progress').innerText = `Question ${qIndex + 1} of 15`;
            const area = document.getElementById('options-area'); area.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = opt;
                btn.onclick = () => { quizScore += (5 - i); qIndex++; showQuestion(); };
                area.appendChild(btn);
            });
        }

        function startAnalysis() {
            const n1 = document.getElementById('name1').value;
            const n2 = document.getElementById('name2').value;
            if(!n1 || !n2) return alert("দয়া করে নাম পূরণ করুন!");
            document.getElementById('display-names').innerText = n1 + " ❤️ " + n2;
            audio.play().catch(()=>{});
            showResult(Math.floor(Math.random() * 41 + 59), "Calculation Result");
        }

        function showResult(score, type) {
            document.getElementById('calc-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('tips-area').innerText = tipsBank[Math.floor(Math.random() * tipsBank.length)];

            let cur = 0;
            const t = setInterval(() => {
                if(cur >= score) { 
                    clearInterval(t); 
                    document.getElementById('final-msg').innerText = score > 85 ? "Soulmate Alert! ❤️" : "Great Bond! ✨";
                    if(score > 85) confetti();
                    setTimeout(() => { document.getElementById('rating-modal').style.display = 'flex'; }, 5000);
                } else {
                    cur++;
                    document.getElementById('score-val').innerText = cur + "%";
                    document.getElementById('meter-fill').style.transform = `translateX(-50%) rotate(${cur * 1.8}deg)`;
                }
            }, 30);
        }

        function saveToGallery() {
            const node = document.getElementById('capture-node');
            const actionBtns = document.getElementById('action-btns');
            actionBtns.style.display = 'none'; 
            
            html2canvas(node, { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Love_Result_Pritam.png';
                link.href = canvas.toDataURL();
                link.click();
                actionBtns.style.display = 'block';
            });
        }

        function setRating(n) {
            const stars = document.getElementById('star-container').children;
            for(let i=0; i<5; i++) stars[i].classList.toggle('active', i < n);
            const msgs = ratingsData[n];
            document.getElementById('rating-msg').innerText = msgs[Math.floor(Math.random() * msgs.length)];
            if(n === 5) confetti();
        }

        function closeRating() { document.getElementById('rating-modal').style.display = 'none'; }
