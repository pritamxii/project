<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator Pro - Pritam Mistry</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; padding: 20px 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #capture-node {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 95%; max-width: 420px;
            padding: 30px 20px; text-align: center; border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: relative; z-index: 10;
        }

        .logo-text {
            font-family: 'Brush Script MT', cursive; font-size: 4rem;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        input {
            width: 100%; padding: 15px; border: none;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 15px; margin-bottom: 12px; outline: none; 
            font-size: 16px; color: #fff; font-weight: 500;
        }
        input::placeholder { color: rgba(255,255,255,0.8); }

        .btn-main {
            width: 100%; padding: 16px; 
            background: linear-gradient(45deg, #dc2743, #bc1888);
            color: white; border: none; border-radius: 15px; font-weight: bold;
            cursor: pointer; font-size: 17px; margin-bottom: 10px;
        }

        .percentage-text { font-size: 70px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(0,0,0,0.2); }

        #advice-box {
            margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.2);
            border-radius: 15px; font-size: 14px; color: #fff; display: none;
        }

        .share-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .share-btn { padding: 12px; border-radius: 12px; border: none; color: white; font-size: 14px; cursor: pointer; font-weight: bold; flex: 1; }
        .wa { background: #25D366; } .ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

        .heart-particle {
            position: fixed; bottom: -10%; font-size: 25px;
            user-select: none; pointer-events: none; z-index: 1;
            animation: floatUp 4s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120vh); opacity: 0; }
        }

        .contact-us {
            margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.3);
        }
        .contact-us p { font-size: 14px; color: #fff; margin-bottom: 10px; font-weight: bold; }
        .social-links a {
            display: inline-block; margin: 0 10px; color: #fff; text-decoration: none; font-size: 13px;
            background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px;
        }

        footer { margin-top: 15px; font-size: 11px; color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>

    <audio id="loveSong" loop><source src="Real_love.mp3" type="audio/mpeg"></audio>

    <div id="capture-node">
        <div class="logo-text">Love Calc</div>
        <p style="color:#fff; font-size:12px; margin-bottom: 20px; opacity: 0.8;">Created by Pritam Mistry</p>
        
        <div id="input-area">
            <input type="text" id="name1" placeholder="আপনার নাম..." autocomplete="off">
            <input type="text" id="name2" placeholder="পার্টনারের নাম..." autocomplete="off">
            <button class="btn-main" onclick="startAnalysis()">Calculate ❤️</button>
        </div>

        <div id="loader" style="display:none;">
            <div style="font-size:50px; animation: heartbeat 1s infinite;">💖</div>
            <p style="color:white;">বিশ্লেষণ চলছে...</p>
        </div>

        <div id="result-box" style="display: none;">
            <h3 id="names-display" style="color:#fff;"></h3>
            <div class="percentage-text" id="score-val">0%</div>
            
            <div style="background: rgba(255,255,255,0.15); padding:15px; border-radius:20px; color:#fff;">
                <b id="meme-label" style="display:block; font-size: 18px; margin-bottom: 5px;"></b>
                <span id="final-msg"></span>
            </div>

            <button class="btn-main" style="margin-top:15px; background:#23a6d5;" onclick="getAdvice()">Relationship Advice? 💡</button>
            <div id="advice-box"></div>

            <div class="share-container">
                <button onclick="shareImageAndLink('WhatsApp')" class="share-btn wa">WhatsApp</button>
                <button onclick="shareImageAndLink('Instagram')" class="share-btn ig">Instagram</button>
            </div>

            <button class="btn-main" style="margin-top:10px; background:rgba(0,0,0,0.4);" onclick="downloadCard()">Save to Gallery 📸</button>
            <p onclick="location.reload()" style="cursor:pointer; font-size:14px; color:#fff; margin-top:10px; font-weight:bold;">আবার চেষ্টা করুন 🔄</p>
        </div>

        <div class="contact-us">
            <p>Contact Us</p>
            <div class="social-links">
                <a href="https://www.facebook.com/share/1Du24h9PiY/" target="_blank">Facebook</a>
                <a href="https://www.instagram.com/pritamxii?igsh=MW1ja2N4MXhxMTdiYg==" target="_blank">Instagram</a>
            </div>
        </div>

        <footer>© 2026 PRITAM MISTRY</footer>
    </div>

    <script>
        const audio = document.getElementById('loveSong');
        let currentScore = 0; let p1="", p2="";

        function createFloatingHearts() {
            for(let i=0; i<20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-particle';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 4000);
                }, i * 200);
            }
        }

        function startAnalysis() {
            p1 = document.getElementById('name1').value.trim();
            p2 = document.getElementById('name2').value.trim();
            if (!p1 || !p2) { alert("নাম লিখুন!"); return; }
            audio.play().catch(e=>{});
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('result-box').style.display = 'block';
                showResult(p1, p2);
            }, 2000);
        }

        function showResult(n1, n2) {
            document.getElementById('names-display').innerText = n1 + " + " + n2;
            let score = ((n1.length + n2.length) * 7 + (n1.charCodeAt(0) || 0)) % 101;
            if(score < 30) score += 40;
            currentScore = score;
            let cur = 0;
            const t = setInterval(() => {
                if (cur >= score) {
                    clearInterval(t); finalizeResult(score); createFloatingHearts();
                } else {
                    cur++; document.getElementById('score-val').innerText = cur + "%";
                }
            }, 25);
        }

        function finalizeResult(s) {
            const label = document.getElementById('meme-label');
            const msg = document.getElementById('final-msg');
            if(s >= 90) { label.innerText="Perfect Match! 🤵👰"; msg.innerText="তোরা একদম মেড ফর ইচ আদার!"; confetti(); }
            else if(s >= 70) { label.innerText="Super Chemistry! ✨"; msg.innerText="সম্পর্কটা দারুণ ভাবে এগিয়ে নিয়ে চলো!"; }
            else { label.innerText="Need Efforts! 💀"; msg.innerText="একটু বেশি সময় দাও একে অপরকে।"; }
        }

        function getAdvice() {
            const advices = ["আজই ফুচকা খাওয়াও!", "বেশি সন্দেহ কোরো না!", "সারপ্রাইজ গিফট দাও!", "একসাথে মুভি দেখো!", "মাঝেমধ্যে সরি বলো!"];
            const box = document.getElementById('advice-box');
            box.style.display = 'block';
            box.innerText = "💡 Advice: " + advices[Math.floor(Math.random() * advices.length)];
        }

        // --- ইমেজ এবং লিঙ্ক শেয়ারিং ম্যাজিক ---
        async function shareImageAndLink(platform) {
            const node = document.getElementById('capture-node');
            
            // বাটন সাময়িকভাবে লুকানো
            const elements = document.querySelectorAll('.btn-main, .share-container, .contact-us, footer');
            elements.forEach(el => el.style.visibility = 'hidden');

            const canvas = await html2canvas(node, { scale: 2, backgroundColor: null });
            const dataUrl = canvas.toDataURL("image/png");
            const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], 'LoveResult.png', { type: 'image/png' });

            elements.forEach(el => el.style.visibility = 'visible');

            if (navigator.share) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Love Calculator Result',
                        text: `আমার আর ${p2}-এর ভালোবাসার স্কোর ${currentScore}%! ❤️ চেক করো তোমারটা এই লিঙ্কে: ${window.location.href}`,
                    });
                } catch (err) {
                    alert(`${platform}-এ শেয়ার করতে হলে আগে ইমেজটি সেভ করে নিন।`);
                }
            } else {
                alert("আপনার ব্রাউজার সরাসরি শেয়ার সাপোর্ট করছে না। রেজাল্টটি সেভ করে শেয়ার করুন।");
            }
        }

        function downloadCard() {
            const node = document.getElementById('capture-node');
            html2canvas(node, { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Love_Result_Pritam.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
