<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator - Created by Pritam</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #capture-node {
            background-color: white;
            width: 90%;
            max-width: 400px;
            padding: 40px 25px;
            text-align: center;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative;
        }

        .logo-text {
            font-family: 'Brush Script MT', cursive;
            font-size: 4.5rem;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        #loader {
            display: none;
            margin: 20px auto;
        }
        .heart-loader {
            font-size: 50px;
            animation: heartbeat 1s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .funky-msg {
            font-size: 18px;
            line-height: 1.6;
            padding: 20px;
            background: #fff5f6;
            border-radius: 20px;
            border: 2px dashed #ff9a9e;
            margin-top: 15px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            background-color: #f9f9f9;
            outline: none;
            font-size: 16px;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: #dc2743; }

        .btn-calculate, .btn-download {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.2s;
        }
        .btn-calculate:active { transform: scale(0.95); }

        .percentage-text {
            font-size: 75px;
            font-weight: 900;
            color: #ed4956;
            margin: 10px 0;
            text-shadow: 2px 2px 10px rgba(237, 73, 86, 0.2);
        }

        #names-display {
            font-size: 22px;
            color: #2c3e50;
            font-weight: 800;
            margin-bottom: 15px;
        }

        #music-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #eee;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        footer { 
            margin-top: 25px; 
            font-size: 12px; 
            color: #bbb; 
            letter-spacing: 1px; 
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <audio id="loveSong" loop>
        <source src="Real_love.mp3" type="audio/mpeg">
    </audio>

    <div id="capture-node">
        <button id="music-toggle" onclick="toggleMusic()">🔇</button>
        
        <div class="calc-header">
            <div class="logo-text">Love Calc</div>
            <p style="color:#666; font-size:14px; margin-bottom:25px; font-weight: 600;">"Not Exact, but Exactly"</p>
        </div>

        <div id="input-area">
            <input type="text" id="name1" placeholder="আপনার নাম..." autocomplete="off">
            <input type="text" id="name2" placeholder="পার্টনারের নাম..." autocomplete="off">
            <button class="btn-calculate" onclick="startAnalysis()">Calculate ❤️</button>
        </div>

        <div id="loader">
            <div class="heart-loader">💖</div>
            <p style="font-weight: bold; color: #dc2743;">গভীরভাবে বিশ্লেষণ করা হচ্ছে...</p>
        </div>

        <div id="result-box" style="display: none;">
            <div id="names-display"></div>
            <div class="percentage-text" id="score-val">0%</div>
            <div class="funky-msg" id="msg-container">
                <b id="meme-label" style="display:block; color:#d63031; margin-bottom:8px; font-size: 20px;"></b>
                <span id="final-msg"></span>
            </div>
            
            <div id="action-buttons" style="margin-top: 20px;">
                <button class="btn-download" onclick="downloadCard()">Save Result 📸</button>
                <p onclick="location.reload()" style="margin-top:20px; color:#0095f6; cursor:pointer; font-size:15px; font-weight:bold;">আবার চেষ্টা করুন 🔄</p>
            </div>
        </div>

        <footer>Created by Pritam</footer>
    </div>

    <script>
        const audio = document.getElementById('loveSong');
        let musicPlaying = false;

        function toggleMusic() {
            if (musicPlaying) {
                audio.pause();
                document.getElementById('music-toggle').innerText = "🔇";
            } else {
                audio.play().catch(e => {});
                document.getElementById('music-toggle').innerText = "🔊";
            }
            musicPlaying = !musicPlaying;
        }

        function startAnalysis() {
            const n1 = document.getElementById('name1').value.trim();
            const n2 = document.getElementById('name2').value.trim();
            
            if (!n1 || !n2) { 
                alert("দয়া করে দুটি নামই লিখুন! 😂"); 
                return; 
            }

            if (!musicPlaying) toggleMusic();

            document.getElementById('input-area').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                showResult(n1, n2);
            }, 2000);
        }

        function showResult(n1, n2) {
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            
            document.getElementById('names-display').innerText = n1 + " 💖 " + n2;

            let score = ((n1.length + n2.length) * 7 + (n1.charCodeAt(0) || 0)) % 101;
            if (score < 30) score += 30; 
            if ((n1+n2).toLowerCase().includes("ahana")) score = 100;

            let current = 0;
            const timer = setInterval(() => {
                if (current >= score) {
                    clearInterval(timer);
                    finalizeUI(score);
                } else {
                    current++;
                    document.getElementById('score-val').innerText = current + "%";
                }
            }, 25);
        }

        function finalizeUI(val) {
            const label = document.getElementById('meme-label');
            const msgEl = document.getElementById('final-msg');
            
            if (val >= 90) {
                label.innerText = "Rab Ne Bana Di Jodi 👰";
                msgEl.innerText = "তোরা তো পুরো পারফেক্ট! বিয়েতে বিরিয়ানির লেগ পিসটা আমার জন্য বুক করে রাখ।";
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else if (val >= 70) {
                label.innerText = "Jalwa Hai Hamara! ✨";
                msgEl.innerText = "তোদের কেমিস্ট্রি দেখে আইনিস্টাইনও অবাক হয়ে যেত! জাস্ট ফাটিয়ে দে দোস্ত।";
            } else if (val >= 45) {
                label.innerText = "Gajab Bejjati Hai! 🤣";
                msgEl.innerText = "স্কোর তো এভারেজ! ব্রেক-আপ ঠেকাতে আজই দামী কোনো গিফট কিনে দে।";
            } else {
                label.innerText = "Beta Tumse Na Ho Payega! 💀";
                msgEl.innerText = "ভাই তুই বরং সিঙ্গেল থাকাই প্র্যাকটিস কর! তোর কপালে দুঃখ আছে।";
            }
        }

        function downloadCard() {
            const node = document.getElementById('capture-node');
            const actionBtns = document.getElementById('action-buttons');
            const musicBtn = document.getElementById('music-toggle');
            
            actionBtns.style.display = 'none';
            musicBtn.style.display = 'none';

            html2canvas(node, {
                scale: 3, 
                backgroundColor: "#ffffff",
                borderRadius: 30
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Love_Result_Pritam.png';
                link.href = canvas.toDataURL("image/png");
                link.click();

                actionBtns.style.display = 'block';
                musicBtn.style.display = 'block';
            });
        }
    </script>
</body>
</html>
