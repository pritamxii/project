<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Engine Ultra - Pritam Mistry</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #ff2d55;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at center, #0f0c29, #302b63, #24243e);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; padding: 20px 0; color: white;
        }

        /* Glass Container */
        #capture-node {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            width: 95%; max-width: 450px;
            padding: 40px 25px; border-radius: 40px;
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative; z-index: 10;
        }

        .logo-text {
            font-family: 'Brush Script MT', cursive; font-size: 4rem;
            background: linear-gradient(45deg, #ff0055, #ffdd00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,45,85,0.5));
        }

        /* Photo Upload Styling */
        .photo-upload-container {
            display: flex; justify-content: space-around; margin: 25px 0;
        }
        .upload-box {
            width: 100px; height: 100px; border: 2px dashed var(--border);
            border-radius: 50%; overflow: hidden; position: relative;
            background: rgba(255,255,255,0.05); cursor: pointer;
        }
        .upload-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .upload-box span { font-size: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.6; }

        input {
            width: 100%; padding: 15px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); border-radius: 15px;
            margin-bottom: 15px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon); background: rgba(255,255,255,0.1); }

        .btn-main {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: linear-gradient(45deg, #ff2d55, #fb24a1);
            color: white; font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,45,85,0.3); transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Love Meter */
        .meter-container {
            width: 150px; height: 75px; position: relative; margin: 20px auto;
            overflow: hidden; border-radius: 150px 150px 0 0;
            background: rgba(255,255,255,0.1); border: 1px solid var(--border);
        }
        #meter-fill {
            position: absolute; top: 100%; left: 50%; width: 100%; height: 100%;
            background: linear-gradient(to top, #ff2d55, #ffdd00);
            transform-origin: top center; transform: translateX(-50%) rotate(0deg);
            transition: transform 2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .percentage-text { font-size: 60px; font-weight: 800; margin: 10px 0; text-shadow: 0 0 15px var(--neon); }

        /* Dynamic Proposal Box */
        #proposal-card {
            display: none; background: rgba(0,0,0,0.3); border-radius: 20px;
            padding: 20px; margin-top: 20px; border: 1px dashed #ffdd00;
            font-style: italic; font-size: 14px; color: #ffdd00;
        }

        .floating-emoji {
            position: fixed; bottom: -10%; font-size: 30px; pointer-events: none;
            z-index: 1; animation: floatAnim 4s linear forwards;
        }
        @keyframes floatAnim {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        .share-container { display: flex; gap: 10px; margin-top: 20px; }
        .share-btn { flex: 1; padding: 12px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
        .wa { background: #25D366; } .ig { background: #f09433; }

        .contact-us { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .social-links a {
            display: inline-block; margin: 0 10px; color: white; text-decoration: none;
            font-size: 11px; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px;
        }

        footer { margin-top: 20px; font-size: 10px; opacity: 0.4; letter-spacing: 3px; }
    </style>
</head>
<body>

    <audio id="loveSong" loop><source src="Real_love.mp3" type="audio/mpeg"></audio>

    <div id="capture-node">
        <div class="logo-text">Love Engine</div>
        <p style="font-size: 10px; opacity: 0.6; margin-bottom: 20px;">PREMIUM EDITION | BY PRITAM MISTRY</p>
        
        <div id="input-area">
            <div class="photo-upload-container">
                <div class="upload-box" onclick="document.getElementById('p1-input').click()">
                    <span id="p1-label">Your Photo</span>
                    <img id="p1-img">
                    <input type="file" id="p1-input" hidden accept="image/*" onchange="preview(event, 'p1-img', 'p1-label')">
                </div>
                <div style="font-size: 30px; align-self: center; color: var(--neon);">❤️</div>
                <div class="upload-box" onclick="document.getElementById('p2-input').click()">
                    <span id="p2-label">Her Photo</span>
                    <img id="p2-img">
                    <input type="file" id="p2-input" hidden accept="image/*" onchange="preview(event, 'p2-img', 'p2-label')">
                </div>
            </div>
            <input type="text" id="name1" placeholder="Your Name..." autocomplete="off">
            <input type="text" id="name2" placeholder="Her Name..." autocomplete="off">
            <button class="btn-main" onclick="startAnalysis()">Analyse Connection ❤️</button>
        </div>

        <div id="loader" style="display:none;">
            <div style="font-size:60px; animation: heartbeat 1s infinite;">💖</div>
            <p>Scanning Vibrations...</p>
        </div>

        <div id="result-box" style="display: none;">
            <div class="meter-container">
                <div id="meter-fill"></div>
            </div>
            <div class="percentage-text" id="score-val">0%</div>
            <h3 id="names-display" style="margin-bottom: 15px; font-weight: 300;"></h3>
            
            <div style="background: rgba(255,255,255,0.05); padding:20px; border-radius:25px; border: 1px solid var(--border);">
                <b id="meme-label" style="display:block; color: #ffdd00; font-size: 18px; margin-bottom: 5px;"></b>
                <span id="final-msg" style="font-size: 14px;"></span>
            </div>

            <div id="proposal-card"></div>
            
            <div class="share-container">
                <button onclick="shareResult('WA')" class="share-btn wa">WhatsApp</button>
                <button onclick="shareResult('IG')" class="share-btn ig">Instagram</button>
            </div>

            <button class="btn-main" style="margin-top:15px; background: transparent; border: 1px solid white;" onclick="downloadCard()">Save To Gallery 📸</button>
            <p onclick="location.reload()" style="cursor:pointer; font-size:14px; color:#0095f6; margin-top:20px; font-weight: bold;">Retry 🔄</p>
        </div>

        <div class="contact-us">
            <p style="font-size: 12px; margin-bottom: 15px;">Created By Pritam</p>
            <div class="social-links">
                <a href="https://www.facebook.com/share/1Du24h9PiY/" target="_blank">Facebook</a>
                <a href="https://www.instagram.com/pritamxii?igsh=MW1ja2N4MXhxMTdiYg==" target="_blank">Instagram</a>
            </div>
        </div>

        <footer>© 2026 PRITAM MISTRY</footer>
    </div>

    <script>
        const audio = document.getElementById('loveSong');
        let currentScore = 0; let n1="", n2="";

        function preview(event, imgId, labelId) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById(imgId);
                output.src = reader.result;
                output.style.display = 'block';
                document.getElementById(labelId).style.display = 'none';
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function startAnalysis() {
            n1 = document.getElementById('name1').value.trim();
            n2 = document.getElementById('name2').value.trim();
            if (!n1 || !n2) { alert("Please fill names!"); return; }
            audio.play().catch(e=>{});
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setTimeout(showResult, 2500);
        }

        function showResult() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('names-display').innerText = n1 + " + " + n2;

            let score = ((n1.length + n2.length) * 7 + (n1.charCodeAt(0) || 0)) % 101;
            if(score < 30) score += 35;
            currentScore = score;

            // Meter & Percentage Logic
            let cur = 0;
            const t = setInterval(() => {
                if (cur >= score) {
                    clearInterval(t);
                    finalizeUI(score);
                    spawnEmojis(score);
                } else {
                    cur++;
                    document.getElementById('score-val').innerText = cur + "%";
                    document.getElementById('meter-fill').style.transform = `translateX(-50%) rotate(${cur * 1.8}deg)`;
                }
            }, 25);
        }

        function finalizeUI(s) {
            const label = document.getElementById('meme-label');
            const msg = document.getElementById('final-msg');
            const proposal = document.getElementById('proposal-card');
            
            if(s >= 90) {
                label.innerText="Perfect Connection! 💍";
                msg.innerText="তোমরা একদম পারফেক্ট! বিয়েতে বিরিয়ানির লেগ পিসটা আমার জন্য বুক রাখিস।";
                proposal.style.display = 'block';
                proposal.innerText = `"Dear ${n2}, since the engine says we are ${s}% compatible, I just want to say... You are the missing gear in my life! ❤️"`;
                confetti();
            } else if(s >= 70) {
                label.innerText="Super Hot! 🔥";
                msg.innerText="কেমিস্ট্রি হেব্বি জোস! জাস্ট ফাটিয়ে দে দোস্ত।";
            } else {
                label.innerText="Needs Refinement! 💀";
                msg.innerText="তোর ইঞ্জিনে মনে হয় জং ধরেছে! আগে ফুচকা খাইয়ে ঠিক কর।";
            }
        }

        function spawnEmojis(score) {
            let list = score >= 70 ? ['❤️','💖','✨','💍'] : ['💀','🚩','💔','🤣'];
            for(let i=0; i<20; i++) {
                setTimeout(() => {
                    const e = document.createElement('div');
                    e.className = 'floating-emoji';
                    e.innerHTML = list[Math.floor(Math.random()*list.length)];
                    e.style.left = Math.random() * 100 + 'vw';
                    document.body.appendChild(e);
                    setTimeout(() => e.remove(), 4000);
                }, i * 200);
            }
        }

        async function shareResult() {
            const text = `আমার আর ${n2}-এর ভালোবাসার স্কোর ${currentScore}%! ❤️`;
            if (navigator.share) {
                const canvas = await html2canvas(document.getElementById('capture-node'), { scale: 2 });
                const blob = await (await fetch(canvas.toDataURL())).blob();
                const file = new File([blob], 'LoveEngine.png', { type: 'image/png' });
                navigator.share({ files: [file], title: 'Love Engine', text: text });
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`);
            }
        }

        function downloadCard() {
            const node = document.getElementById('capture-node');
            const el = document.querySelectorAll('.share-container, .btn-main, p, .contact-us, footer');
            el.forEach(b => b.style.display = 'none');
            html2canvas(node, { scale: 3, backgroundColor: null }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Love_Engine_Result.png`;
                link.href = canvas.toDataURL();
                link.click();
                el.forEach(b => b.style.display = 'block');
            });
        }
    </script>
</body>
</html>
